<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Scholar v4 — MeshFahem</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet" />
<style>html,body{margin:0;padding:0;background:#1a1a1a;font-family:Inter,sans-serif} *{box-sizing:border-box}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="templates/Scholar-v4.jsx"></script>
<script type="text/babel" data-presets="react">
  const families = [
    { f: "navy",    n: "Navy & Gold" },
    { f: "oxblood", n: "Oxblood & Cream" },
    { f: "forest",  n: "Forest & Parchment" },
    { f: "ink",     n: "Ink & Blush" },
    { f: "copper",  n: "Copper & Charcoal" },
    { f: "mono",    n: "Monochrome" },
  ];
  const pages = [
    { k: "Dash",       l: "Dashboard" },
    { k: "DashProc",   l: "Dashboard · Processing" },
    { k: "DashResult", l: "Dashboard · Results" },
    { k: "Library",    l: "My Library" },
    { k: "Rooms",        l: "Study Rooms" },
    { k: "RoomsCreate",  l: "Study Rooms · Create" },
    { k: "RoomsFriends", l: "Study Rooms · Friends" },
    { k: "RoomsGroups",  l: "Study Rooms · Groups" },
    { k: "Academics",  l: "Academics" },
    { k: "Quiz",           l: "Examinations · Create" },
    { k: "QuizMyQuizzes",  l: "Examinations · My Quizzes" },
    { k: "QuizExplore",    l: "Examinations · Explore" },
    { k: "QuizHistory",    l: "Examinations · History" },
    { k: "QuizGlobal",     l: "Examinations · Global Exams" },
    { k: "QuizPreview",    l: "Examinations · Preview" },
    { k: "QuizActive",     l: "Exam · Active — MCQ" },
    { k: "QuizActiveTF",   l: "Exam · Active — True / False" },
    { k: "QuizActiveFill", l: "Exam · Active — Fill in blank" },
    { k: "QuizActiveOpen", l: "Exam · Active — Open ended" },
    { k: "QuizResult",  l: "Exam · Results" },
    { k: "Feedback",   l: "Feedback" },
    { k: "Play",             l: "EduPlay · Hub" },
    { k: "PlayLobby",        l: "EduPlay · Brain Rush Lobby" },
    { k: "PlayHost",         l: "EduPlay · Host a Game — AI Generate" },
    { k: "PlayHostManual",   l: "EduPlay · Host a Game — Manual Build" },
    { k: "PlayHostWait",     l: "EduPlay · Waiting Room" },
    { k: "PlayJoin",         l: "EduPlay · Join a Game" },
    { k: "PlayFindMatch",    l: "EduPlay · Find a Match" },
    { k: "PlayBattle",          l: "EduPlay · Brain Rush · Active" },
    { k: "PlayBattleLeader",   l: "EduPlay · Brain Rush · Leaderboard" },
    { k: "PlayResult",         l: "EduPlay · Brain Rush · Results" },
    { k: "PlayLobbyMulti",     l: "EduPlay · Multiplayer · Lobby" },
    { k: "PlayBattleMulti",    l: "EduPlay · Multiplayer · Active" },
    { k: "AcademicsTutor",     l: "Academics · AI Tutor" },
    { k: "AcademicsExams",     l: "Academics · Exam Schedule" },
    { k: "AcademicsSRS",       l: "Academics · SRS Review" },
    { k: "AcademicsAnalytics", l: "Academics · Analytics" },
    { k: "ContentView",        l: "Content · Read Mode" },
    { k: "ContentViewBook",    l: "Content · Book Mode" },
    { k: "ContentViewAudio",   l: "Content · Audio Study" },
    { k: "History",    l: "The Ledger" },
  ];
  const App = () => (
    <DesignCanvas title="MeshFahem · Scholar v4" subtitle="Themed sidebars, custom icons, light + dark modes for every theme.">
      {families.map(fam => (
        ["light","dark"].map(mode => (
          <DCSection key={fam.f + "-" + mode} id={fam.f + "-" + mode} title={fam.n + " — " + (mode === "light" ? "Light" : "Dark") + " Mode"}>
            {pages.map(p => {
              const C = window["S4_" + fam.f + "_" + mode + "_" + p.k];
              return <DCArtboard key={p.k} id={fam.f+mode+p.k} label={p.l} subtitle={fam.n + " · " + (mode === "light" ? "Light" : "Dark")} width={1280} height={820}><C /></DCArtboard>;
            })}
          </DCSection>
        ))
      ))}
    </DesignCanvas>
  );
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
